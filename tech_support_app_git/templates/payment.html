<!DOCTYPE html>
<html lang="en">
<head>
    <title>Proceed to Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
</head>
<body style="text-align: center; margin-top: 100px;">
    <h2>Booking Confirmed!</h2>
    <p>Please complete your payment of <strong>₹500</strong> to lock in your session slot.</p>
    <button id="rzp-button1">Continue to Pay for Booking</button>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
    var options = {
        "key": "{{ key_id }}", 
        "amount": "{{ order.amount }}",
        "currency": "INR",
        "name": "Tech Support App",
        "description": "Session Booking Fee",
        "order_id": "{{ order.id }}",
        "handler": function (response){
            // Send payment confirmation data back to Flask backend
            fetch('/payment-success', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    booking_id: "{{ booking_id }}",
                    razorpay_payment_id: response.razorpay_payment_id
                })
            })
            .then(res => res.json())
            .then(data => { window.location.href = data.redirect; });
        },
        "theme": { "color": "#3399cc" }
    };
    var rzp1 = new Razorpay(options);
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
    </script>
</body>
</html>
